# Map for WebSocket upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name heystat.pedu.vn;

    # ── Classroom API (FastAPI) ────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Prevent path-traversal via normalized URIs
        proxy_pass_request_headers on;
    }

    # ── Classroom SPA (Vue 3) ─────────────────────────────────────
    location /classroom/ {
        alias /root/HeyStat/classroom/frontend/dist/;
        try_files $uri $uri/ /classroom/index.html;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }



    # Redirect HTTP to HTTPS (Cloudflare handles SSL termination)
    # If using Cloudflare Flexible SSL, comment out this block and use the proxy block below
    # return 301 https://$host$request_uri;

    access_log /var/log/nginx/heystat_access.log;
    error_log /var/log/nginx/heystat_error.log warn;

    location / {
        # Simple proxy to HeyStat container
        proxy_pass http://127.0.0.1:42337;

        # Timeouts for long-running connections
        proxy_read_timeout 86400;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;

        # CRITICAL: Host header MUST match JAMOVI_HOST_A for multi-origin security
        proxy_set_header Host heystat.pedu.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # X-Forwarded-Proto must be https (Cloudflare terminates SSL)
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host heystat.pedu.vn;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Forward WebSocket headers
        proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
        proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
        proxy_set_header Sec-WebSocket-Extensions $http_sec_websocket_extensions;
        proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;

        # Origin from client
        proxy_set_header Origin $http_origin;

        # Forward cookies
        proxy_set_header Cookie $http_cookie;

        # Disable ALL buffering for WebSocket
        proxy_buffering off;
        proxy_cache off;
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache 1;

        # Reduce latency
        tcp_nodelay on;
        keepalive_timeout 65;
    }
}
