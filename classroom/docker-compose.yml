version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: classroom
      POSTGRES_USER: heystat
      POSTGRES_PASSWORD: heystat
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heystat -d classroom"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./api
      dockerfile: ../Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://heystat:heystat@db:5432/classroom
      SYNC_DATABASE_URL: postgresql+psycopg2://heystat:heystat@db:5432/classroom
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - uploads:/uploads
      - /root/Documents:/root/Documents:ro   # Jamovi data root (read-only for safety)
    ports:
      - "8080:8080"
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8080 --workers 2"

  worker:
    build:
      context: ./api
      dockerfile: ../Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
      - db
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://heystat:heystat@db:5432/classroom
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - uploads:/uploads
    command: celery -A tasks.celery_app worker --loglevel=info -Q default

  scheduler:
    build:
      context: ./api
      dockerfile: ../Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
      - db
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://heystat:heystat@db:5432/classroom
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - uploads:/uploads
    command: celery -A tasks.celery_app beat --loglevel=info

volumes:
  pg_data:
  redis_data:
  uploads:
